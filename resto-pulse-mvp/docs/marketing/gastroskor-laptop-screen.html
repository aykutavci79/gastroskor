<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>GastroSkor Laptop Screen — saf siyah fon</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000000; }
    /* Saf siyah — laptop ekranına bindirmede kenar taşması daha az belli olur */
    .screen {
      background: #000000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      position: relative;
      overflow: hidden;
    }
    .frame {
      width: 3840px;
      height: 2160px;
    }
    .laptop-1080 {
      width: 1920px;
      height: 1080px;
    }
    /* İçerik %82 — kenarlarda siyah pay, eğik laptop için */
    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transform: scale(0.82);
    }
    .content-tight {
      transform: scale(0.72);
    }
    .icon-wrap {
      width: 280px;
      height: 280px;
    }
    .frame .icon-wrap {
      width: 520px;
      height: 520px;
    }
    .icon-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      /* glow yok — kenarda turuncu hale bırakmaz */
    }
    .wordmark {
      margin-top: 28px;
      font-size: 72px;
      font-weight: 900;
      letter-spacing: -2px;
      color: #ffffff;
      line-height: 1;
    }
    .frame .wordmark {
      font-size: 132px;
      margin-top: 48px;
    }
    .wordmark span { color: #ff6b35; }
    .tagline {
      margin-top: 14px;
      font-size: 24px;
      font-weight: 600;
      color: #a0a0a0;
    }
    .frame .tagline { font-size: 42px; margin-top: 28px; }
    .badge {
      margin-top: 32px;
      padding: 12px 28px;
      border-radius: 999px;
      border: 2px solid rgba(76, 175, 121, 0.55);
      background: rgba(76, 175, 121, 0.12);
      color: #4caf79;
      font-size: 22px;
      font-weight: 800;
    }
    .frame .badge {
      font-size: 36px;
      margin-top: 56px;
      padding: 18px 40px;
    }
    .sub {
      margin-top: 20px;
      font-size: 28px;
      color: #444444;
    }
    /* Sadece logo + yazı, badge yok — minimal */
    .minimal .badge,
    .minimal .tagline,
    .minimal .sub { display: none; }
  </style>
</head>
<body>

  <!-- 1080 tam — saf siyah -->
  <div class="screen laptop-1080" id="screen-1080">
    <div class="content">
      <div class="icon-wrap">
        <img src="panel-mockups/gastroskor-logo-icon-1024.png" alt="" />
      </div>
      <div class="wordmark">Gastro<span>Skor</span></div>
      <div class="tagline">Doğrudan sipariş · Restoran paneli</div>
      <div class="badge">Sipariş başına aracı komisyonu yok</div>
    </div>
  </div>

  <!-- 1080 sıkı — eğik laptop için daha fazla siyah pay -->
  <div class="screen laptop-1080" id="screen-1080-tight" style="margin-top:24px">
    <div class="content content-tight">
      <div class="icon-wrap">
        <img src="panel-mockups/gastroskor-logo-icon-1024.png" alt="" />
      </div>
      <div class="wordmark">Gastro<span>Skor</span></div>
      <div class="tagline">Doğrudan sipariş · Restoran paneli</div>
      <div class="badge">Sipariş başına aracı komisyonu yok</div>
    </div>
  </div>

  <!-- 1080 minimal — sadece logo + isim -->
  <div class="screen laptop-1080 minimal" id="screen-1080-minimal" style="margin-top:24px">
    <div class="content content-tight">
      <div class="icon-wrap">
        <img src="panel-mockups/gastroskor-logo-icon-1024.png" alt="" />
      </div>
      <div class="wordmark">Gastro<span>Skor</span></div>
    </div>
  </div>

  <!-- 4K -->
  <div class="screen frame" id="screen-4k" style="margin-top:24px">
    <div class="content">
      <div class="icon-wrap">
        <img src="panel-mockups/gastroskor-logo-icon-2048.png" alt="" />
      </div>
      <div class="wordmark">Gastro<span>Skor</span></div>
      <div class="tagline">Doğrudan sipariş · Restoran paneli</div>
      <div class="badge">Sipariş başına aracı komisyonu yok</div>
      <p class="sub">gastroskor.com.tr</p>
    </div>
  </div>

</body>
</html>
