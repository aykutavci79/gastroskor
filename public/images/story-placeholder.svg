<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbf4e8"/>
      <stop offset="0.55" stop-color="#f2e2ca"/>
      <stop offset="1" stop-color="#e8d3b6"/>
    </linearGradient>

    <filter id="paper" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="3" seed="11" result="noise"/>
      <feColorMatrix in="noise" type="matrix"
        values="0 0 0 0 0.20
                0 0 0 0 0.16
                0 0 0 0 0.12
                0 0 0 0.20 0" result="tint"/>
      <feBlend mode="multiply" in="SourceGraphic" in2="tint"/>
    </filter>

    <radialGradient id="v" cx="50%" cy="45%" r="75%">
      <stop offset="0" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.22"/>
    </radialGradient>

    <filter id="ink" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>

    <linearGradient id="frame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d8c1a6"/>
      <stop offset="1" stop-color="#c9ad8f"/>
    </linearGradient>

    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff" stop-opacity="0.18"/>
      <stop offset="0.55" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- frame -->
  <rect x="10" y="10" width="1180" height="780" rx="22" fill="url(#frame)"/>
  <!-- paper -->
  <rect x="22" y="22" width="1156" height="756" rx="18" fill="url(#bg)"/>
  <rect x="22" y="22" width="1156" height="756" rx="18" filter="url(#paper)" opacity="0.95"/>

  <!-- ink clouds -->
  <g fill="#2b1d14" opacity="0.10" filter="url(#ink)">
    <circle cx="160" cy="170" r="90"/>
    <circle cx="280" cy="220" r="120"/>
    <circle cx="980" cy="170" r="110"/>
    <circle cx="870" cy="240" r="140"/>
    <circle cx="240" cy="650" r="140"/>
    <circle cx="980" cy="650" r="150"/>
  </g>

  <!-- subtle shine -->
  <path d="M22,22 L620,22 L22,520 Z" fill="url(#shine)"/>

  <!-- vignette -->
  <rect x="22" y="22" width="1156" height="756" rx="18" fill="url(#v)"/>

  <!-- tiny emblem (quill + dot) -->
  <g opacity="0.35" transform="translate(600 400)">
    <circle cx="0" cy="24" r="4" fill="#2b1d14"/>
    <path d="M-90,40 C-25,-10 10,-70 70,-120 C46,-50 20,0 -30,55 C-55,75 -75,78 -90,70 Z"
      fill="#2b1d14"/>
  </g>
</svg>