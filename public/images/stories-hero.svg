<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="520" viewBox="0 0 1600 520">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbf4e8"/>
      <stop offset="0.55" stop-color="#f3e5cf"/>
      <stop offset="1" stop-color="#ead7bd"/>
    </linearGradient>

    <filter id="paper" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" seed="8" result="noise"/>
      <feColorMatrix in="noise" type="matrix"
        values="0 0 0 0 0.20
                0 0 0 0 0.16
                0 0 0 0 0.12
                0 0 0 0.18 0" result="tint"/>
      <feBlend mode="multiply" in="SourceGraphic" in2="tint"/>
    </filter>

    <radialGradient id="v" cx="50%" cy="45%" r="70%">
      <stop offset="0" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.18"/>
    </radialGradient>

    <filter id="ink" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>

    <linearGradient id="light" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fff" stop-opacity="0.18"/>
      <stop offset="0.6" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="520" fill="url(#bg)"/>
  <rect width="1600" height="520" filter="url(#paper)" opacity="0.95"/>

  <!-- soft ink clouds -->
  <g fill="#2b1d14" opacity="0.10" filter="url(#ink)">
    <circle cx="220" cy="120" r="95"/>
    <circle cx="330" cy="170" r="120"/>
    <circle cx="1380" cy="110" r="110"/>
    <circle cx="1260" cy="160" r="140"/>
    <circle cx="380" cy="430" r="130"/>
    <circle cx="1420" cy="430" r="140"/>
  </g>

  <!-- diagonal light -->
  <path d="M0,0 L880,0 L0,520 Z" fill="url(#light)" opacity="0.8"/>

  <!-- vignette -->
  <rect width="1600" height="520" fill="url(#v)"/>
</svg>