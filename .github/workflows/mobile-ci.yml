name: Mobile CI

on:
  push:
    branches: [main]
    paths:
      - "resto-pulse-mvp/mobile/**"
      - ".github/workflows/mobile-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "resto-pulse-mvp/mobile/**"
      - ".github/workflows/mobile-ci.yml"

concurrency:
  group: mobile-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    defaults:
      run:
        working-directory: resto-pulse-mvp/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: resto-pulse-mvp/mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit (moderate/low — warning only)
        run: |
          npm audit --json > audit.json || true
          node <<'NODE'
          const fs = require('fs');
          let data;
          try {
            data = JSON.parse(fs.readFileSync('audit.json', 'utf8'));
          } catch {
            console.log('::warning::npm audit JSON okunamadi');
            process.exit(0);
          }
          const v = data.metadata?.vulnerabilities ?? {};
          const moderate = v.moderate ?? 0;
          const low = (v.low ?? 0) + (v.info ?? 0);
          if (moderate > 0 || low > 0) {
            console.log(
              `::warning::npm audit: ${moderate} moderate, ${low} low/info — workflow devam ediyor`
            );
          } else {
            console.log('npm audit: moderate/low yok');
          }
          NODE

      - name: npm audit (high/critical — fail)
        run: npm audit --audit-level=high

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test:sentry-scrub
